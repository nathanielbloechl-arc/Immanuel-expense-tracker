<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breeze-Style Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <style>
        /* Strict iOS CSS Media Query for Printing Rules */
        @media print {
            /* Hide the entry form, main buttons, and action columns on the printout */
            body { background: #ffffff !important; color: #000000 !important; }
            #input-form-container, #export-pdf, .action-column, header p { display: none !important; }
            
            /* Expand the main application layout to fill the printed page boundaries */
            #main-app-content, #history-container { width: 100% !important; max-width: 100% !important; display: block !important; }
            
            /* Format transaction ledger explicitly for physical paper styles */
            table { width: 100% !important; border-collapse: collapse !important; margin-bottom: 30px !important; }
            tr { page-break-inside: avoid !important; break-inside: avoid !important; }
            th, td { padding: 8px !important; border-bottom: 1px solid #e2e8f0 !important; color: #000000 !important; }
            
            /* Build print structures for the attached receipt blocks */
            #print-appendix-title { display: block !important; margin-top: 40px !important; page-break-before: always !important; break-before: page !important; }
            #print-receipt-gallery { display: block !important; }
            .print-receipt-card { page-break-inside: avoid !important; break-inside: avoid !important; margin-bottom: 40px !important; text-align: center; }
            .print-receipt-img { max-height: 550px !important; max-width: 100% !important; width: auto !important; height: auto !important; display: inline-block !important; object-fit: contain !important; border: 1px solid #ccc; padding: 10px; background: #fff; }
        }
        
        /* Default Screen (Non-Print) Display Overrides */
        #print-appendix-title, #print-receipt-gallery { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div id="main-app-content" class="max-w-4xl mx-auto p-4 sm:p-6">
        <header class="mb-8 flex justify-between items-center border-b pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Breeze<span class="text-blue-600 font-medium">Log</span></h1>
                <p class="text-sm text-gray-500">Local-first expense logging & receipt vault</p>
            </div>
            <div class="text-right">
                <span class="text-xs uppercase tracking-wider text-gray-400 block">Total Spent</span>
                <span id="total-display" class="text-2xl font-black text-gray-900">$0.00</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div id="input-form-container" class="md:col-span-1 bg-white p-5 rounded-xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Log Expense</h2>
                <form id="expense-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Date</label>
                        <input type="date" id="exp-date" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Vendor / Store</label>
                        <input type="text" id="exp-vendor" placeholder="e.g., Office Max" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Description / Purpose</label>
                        <input type="text" id="exp-desc" placeholder="e.g., Communion elements" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Amount ($)</label>
                        <input type="number" id="exp-amount" step="0.01" placeholder="0.00" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Category Code</label>
                        <select id="exp-category" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="Buildings & Grounds (5100)">Buildings & Grounds (5100)</option>
                            <option value="Outreach (5200)">Outreach (5200)</option>
                            <option value="Education Materials (5305)">Education Materials (5305)</option>
                            <option value="Worship Materials (5310)">Worship Materials (5310)</option>
                            <option value="Printing, Postage (5405)">Printing, Postage (5405)</option>
                            <option value="Office Supplies (5410)">Office Supplies (5410)</option>
                            <option value="Kitchen, Food, Bev (5415)">Kitchen, Food, Bev (5415)</option>
                            <option value="Cleaning Supplies (5420)">Cleaning Supplies (5420)</option>
                            <option value="Software Applications (5425)">Software Applications (5425)</option>
                            <option value="Pastor Allowance (5510)">Pastor Allowance (5510)</option>
                            <option value="Misc**">Misc**</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Receipt Image</label>
                        <input type="file" id="exp-file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition-colors mt-2">
                        Add to Registry
                    </button>
                </form>
            </div>

            <div id="history-container" class="md:col-span-2 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-900">Transaction History</h2>
                    <button id="export-pdf" class="text-xs bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-1.5 shadow-sm">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Export Statement PDF
                    </button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-100 text-xs font-semibold uppercase tracking-wider text-gray-400">
                                    <th class="py-3 px-4">Date</th>
                                    <th class="py-3 px-4">Details</th>
                                    <th class="py-3 px-4 font-medium text-center class-receipt-header">Receipt</th>
                                    <th class="py-3 px-4 text-right action-column">Action</th>
                                </tr>
                            </thead>
                            <tbody id="ledger-body" class="divide-y divide-gray-100 text-sm">
                                </tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="p-8 text-center text-gray-400 hidden">
                        No transactions logged yet.
                    </div>
                </div>
            </div>
        </div>

        <h2 id="print-appendix-title" class="text-xl font-bold text-gray-900 border-b-2 pb-2 mb-4">Receipt Ledger Appendix</h2>
        <div id="print-receipt-gallery" class="space-y-6"></div>
    </div>

    <div id="image-modal" class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-200" onclick="closeModal()">
        <div class="relative bg-white p-2 rounded-xl max-w-2xl w-full max-h-[85vh] flex flex-col" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-3 right-3 bg-gray-900/80 text-white hover:bg-black rounded-full p-1.5 transition-colors z-10">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            <div class="overflow-auto flex justify-center items-center bg-gray-150 rounded-lg">
                <img id="modal-img" src="" alt="Receipt Preview" class="max-w-full max-h-[75vh] object-contain">
            </div>
        </div>
    </div>

    <script>
        const db = new Dexie("BreezeChurchDB");
        db.version(1).stores({
            expenses: '++id, date, vendor, description, amount, category'
        });

        const expenseForm = document.getElementById('expense-form');
        const ledgerBody = document.getElementById('ledger-body');
        const emptyState = document.getElementById('empty-state');
        const totalDisplay = document.getElementById('total-display');
        const imageModal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-img');

        document.getElementById('exp-date').value = new Date().toISOString().substring(0, 10);

        async function renderRegistry() {
            const records = await db.expenses.orderBy('date').reverse().toArray();
            if (records.length === 0) {
                ledgerBody.innerHTML = '';
                emptyState.classList.remove('hidden');
                totalDisplay.innerText = "$0.00";
                return;
            }
            
            emptyState.classList.add('hidden');
            let htmlBuffer = '';
            let totalRunning = 0;
            let receiptPrintCounter = 0;

            records.forEach(item => {
                totalRunning += parseFloat(item.amount);
                let receiptUi = '<span class="text-gray-300 text-xs">—</span>';
                let printLabel = '';
                
                if (item.imageBlob) {
                    receiptPrintCounter++;
                    printLabel = `<div class="mt-1 font-bold text-[10px] text-blue-600 block sm:hidden md:block print:block">[Appendix #${receiptPrintCounter}]</div>`;
                    receiptUi = `
                        <button onclick="viewReceipt(${item.id})" class="inline-flex items-center text-blue-600 hover:text-blue-800 bg-blue-50 px-2 py-1 rounded text-xs font-medium no-print">
                            View Image
                        </button>
                        ${printLabel}
                    `;
                }

                htmlBuffer += `
                    <tr class="hover:bg-gray-50/70 transition-colors">
                        <td class="py-3.5 px-4 font-mono text-xs text-gray-500">${item.date}</td>
                        <td class="py-3.5 px-4">
                            <div class="flex justify-between items-start mb-0.5">
                                <span class="font-semibold text-gray-900">${escapeHtml(item.vendor)}</span>
                                <span class="font-bold text-gray-900 ml-4">$${parseFloat(item.amount).toFixed(2)}</span>
                            </div>
                            <span class="text-xs text-gray-500 block truncate max-w-[280px]">${escapeHtml(item.description || '')}</span>
                            <span class="inline-block bg-blue-50 text-blue-700 text-[10px] px-2 py-0.5 rounded-md font-semibold mt-1">${item.category}</span>
                        </td>
                        <td class="py-3.5 px-4 text-center whitespace-nowrap">${receiptUi}</td>
                        <td class="py-3.5 px-4 text-right action-column">
                            <button onclick="deleteRecord(${item.id})" class="text-gray-400 hover:text-red-600 font-medium text-xs">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });

            ledgerBody.innerHTML = htmlBuffer;
            totalDisplay.innerText = `$${totalRunning.toFixed(2)}`;
        }

        expenseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('exp-date').value;
            const vendor = document.getElementById('exp-vendor').value;
            const description = document.getElementById('exp-desc').value;
            const amount = document.getElementById('exp-amount').value;
            const category = document.getElementById('exp-category').value;
            const fileInput = document.getElementById('exp-file');
            
            let imageBlob = null;
            if (fileInput.files.length > 0) imageBlob = fileInput.files[0];

            await db.expenses.add({ date, vendor, description, amount: parseFloat(amount), category, imageBlob });
            expenseForm.reset();
            document.getElementById('exp-date').value = new Date().toISOString().substring(0, 10);
            renderRegistry();
        });

        async function viewReceipt(id) {
            const entry = await db.expenses.get(id);
            if (entry && entry.imageBlob) {
                modalImg.src = URL.createObjectURL(entry.imageBlob);
                imageModal.classList.remove('hidden');
                setTimeout(() => { imageModal.classList.remove('opacity-0'); }, 10);
            }
        }

        function closeModal() {
            imageModal.classList.add('opacity-0');
            setTimeout(() => {
                imageModal.classList.add('hidden');
                if (modalImg.src.startsWith('blob:')) URL.revokeObjectURL(modalImg.src);
                modalImg.src = '';
            }, 200);
        }

        async function deleteRecord(id) {
            if (confirm("Delete this transaction entry?")) {
                await db.expenses.delete(id);
                renderRegistry();
            }
        }

        // Highly Optimized, Mobile-Safe Printing Execution Block
        document.getElementById('export-pdf').addEventListener('click', async () => {
            const records = await db.expenses.orderBy('date').toArray();
            if (records.length === 0) return alert("No transactions logged to format.");

            const galleryContainer = document.getElementById('print-receipt-gallery');
            galleryContainer.innerHTML = ''; 
            let printAppendixCount = 0;

            // Step 1: Read blobs and convert to base64 synchronously to safeguard mobile layouts
            for (let i = 0; i < records.length; i++) {
                const item = records[i];
                if (item.imageBlob) {
                    printAppendixCount++;
                    
                    const base64Url = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(item.imageBlob);
                    });

                    const card = document.createElement('div');
                    card.className = 'print-receipt-card';
                    card.innerHTML = `
                        <div style="font-size: 13px; font-weight: bold; text-align: left; margin-bottom: 8px;">
                            Appendix Item #${printAppendixCount} — ${item.date} — ${escapeHtml(item.vendor)} ($${parseFloat(item.amount).toFixed(2)})
                        </div>
                        <img class="print-receipt-img" src="${base64Url}" />
                    `;
                    galleryContainer.appendChild(card);
                }
            }

            // Step 2: Allow mobile viewports a tiny fraction of a second to build memory pointers
            const images = galleryContainer.querySelectorAll('.print-receipt-img');
            await Promise.all(Array.from(images).map(img => {
                return new Promise(resolve => {
                    if (img.complete) resolve();
                    else { img.onload = resolve; img.onerror = resolve; }
                });
            }));

            // Step 3: Call System Print Sheets natively
            window.print();
        });

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        renderRegistry();
    </script>
</body>
</html>
